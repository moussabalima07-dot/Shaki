<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shaki Shop — La Mode Qui Te Sublime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --r:#C8184A;--r2:#E8416B;--r3:#FF8FAD;
  --d:#0E0508;--d2:#1A0810;
  --cr:#FFF8F2;--sa:#F5E8D8;--go:#C8952A;--mt:#9A6070;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cr);color:var(--d);overflow-x:hidden}

/* TOPBAR */
.topbar{background:var(--r);color:#fff;text-align:center;padding:10px;font-size:13px;font-weight:500;letter-spacing:.05em;position:sticky;top:0;z-index:900}

/* ══════════ HERO ══════════ */
.hero{
  min-height:100svh;
  position:relative;
  display:flex;align-items:center;
  overflow:hidden;
}
/* Fond boutique plein écran */
.hero-bg{
  position:absolute;inset:0;
  background-size:cover;
  background-position:center;
  filter:brightness(.38) saturate(1.1);
  transform:scale(1.04);
  transition:transform 8s ease;
}
.hero:hover .hero-bg{transform:scale(1.0)}
/* Overlay dégradé par-dessus le fond */
.hero-overlay{
  position:absolute;inset:0;
  background:
    linear-gradient(to right, rgba(14,5,8,.92) 0%, rgba(14,5,8,.6) 55%, rgba(14,5,8,.2) 100%),
    linear-gradient(to top, rgba(14,5,8,.8) 0%, transparent 40%);
}
/* Photo de Shaki côté droit */
.hero-model{
  position:absolute;right:0;top:0;bottom:0;width:48%;
  background-size:cover;
  background-position:center top;
  mask-image:linear-gradient(to left, rgba(0,0,0,.9) 50%, transparent 100%);
  -webkit-mask-image:linear-gradient(to left, rgba(0,0,0,.9) 50%, transparent 100%);
  filter:brightness(.9) saturate(1.15);
}
/* Contenu texte */
.hero-content{
  position:relative;z-index:2;
  padding:140px 64px 100px;
  max-width:640px;
}
.h-pill{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(200,24,74,.18);border:1px solid rgba(200,24,74,.4);
  color:var(--r3);font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  padding:7px 18px;border-radius:100px;
  margin-bottom:28px;
  opacity:0;animation:up .7s ease .1s forwards;
}
.hero-h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(56px,7vw,96px);
  font-weight:900;line-height:.9;
  color:#fff;margin-bottom:14px;
  opacity:0;animation:up .7s ease .25s forwards;
}
.hero-h1 em{display:block;font-style:italic;color:var(--r2)}
.hero-sub{
  font-size:17px;color:rgba(255,255,255,.5);
  line-height:1.75;max-width:420px;margin-bottom:48px;
  opacity:0;animation:up .7s ease .4s forwards;
}
.hero-sub strong{color:var(--r3);font-weight:500}
.cta-row{
  display:flex;gap:12px;flex-wrap:wrap;
  opacity:0;animation:up .7s ease .55s forwards;
}
.btn-r{
  display:inline-flex;align-items:center;gap:10px;
  padding:17px 36px;background:var(--r);color:#fff;
  font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  text-decoration:none;border-radius:3px;
  box-shadow:0 12px 36px rgba(200,24,74,.45);
  transition:all .3s;
}
.btn-r:hover{background:#A01038;transform:translateY(-2px)}
.btn-o{
  display:inline-flex;align-items:center;gap:10px;
  padding:17px 36px;border:1.5px solid rgba(255,255,255,.25);
  color:rgba(255,255,255,.75);font-size:13px;letter-spacing:.08em;text-transform:uppercase;
  text-decoration:none;border-radius:3px;transition:all .3s;
}
.btn-o:hover{border-color:var(--r3);color:var(--r3)}
.hero-badges{
  display:flex;gap:32px;margin-top:60px;padding-top:40px;
  border-top:1px solid rgba(255,255,255,.08);
  opacity:0;animation:up .7s ease .7s forwards;
}
.hb-v{font-family:'Playfair Display',serif;font-size:38px;font-weight:700;color:var(--r2);line-height:1}
.hb-l{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.08em;text-transform:uppercase;margin-top:4px}
/* Badge flottant */
.float-badge{
  position:absolute;bottom:52px;right:calc(48% + 20px);z-index:5;
  background:var(--r);color:#fff;
  padding:16px 22px;border-radius:4px;
  box-shadow:0 16px 48px rgba(200,24,74,.5);
  animation:float 3s ease-in-out infinite;
}
.fb-v{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;line-height:1}
.fb-l{font-size:10px;letter-spacing:.15em;text-transform:uppercase;opacity:.85;margin-top:3px}

/* MARQUEE */
.mq{background:var(--r);overflow:hidden;padding:12px 0}
.mq-t{display:flex;animation:mq 20s linear infinite;white-space:nowrap}
.mq-i{display:inline-flex;align-items:center;gap:16px;padding:0 22px;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#fff}
.mq-d{width:3px;height:3px;background:rgba(255,255,255,.4);border-radius:50%}

/* GARANTIES */
.gars{background:var(--d2);padding:48px 64px}
.gar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.06);max-width:1100px;margin:0 auto}
.gar{background:var(--d2);padding:32px 28px;text-align:center}
.gar-ic{font-size:32px;margin-bottom:14px}
.gar-t{font-size:13px;font-weight:700;color:#fff;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.gar-d{font-size:12px;color:rgba(255,255,255,.35);line-height:1.6}

/* SECTION */
.sec{padding:100px 64px}
.sec-inner{max-width:1100px;margin:0 auto}
.sec-tag{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--r);display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sec-tag::after{content:'';width:32px;height:1px;background:var(--r)}
.sec-h{font-family:'Playfair Display',serif;font-size:clamp(34px,4vw,54px);font-weight:900;line-height:1.05;color:var(--d);margin-bottom:8px}
.sec-h em{font-style:italic;color:var(--r)}
.sec-sub{font-size:15px;color:var(--mt);line-height:1.7;max-width:500px}

/* PRODUITS */
.prod-bg{background:var(--cr)}
.prod-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:52px}
.prod-grid{display:grid;grid-template-columns:1.2fr 1fr 1fr;grid-template-rows:auto auto;gap:16px}
.pc{position:relative;overflow:hidden;border-radius:6px;background:var(--sa);cursor:pointer;transition:box-shadow .4s,transform .3s}
.pc:hover{box-shadow:0 24px 64px rgba(200,24,74,.15);transform:translateY(-3px)}
.pc-img{width:100%;object-fit:cover;display:block;transition:transform .6s ease}
.pc:hover .pc-img{transform:scale(1.05)}
.pc:first-child{grid-row:span 2}
.pc:first-child .pc-img{height:520px}
.pc:not(:first-child) .pc-img{height:220px}
.pc-emoji{display:flex;align-items:center;justify-content:center;font-size:72px;background:linear-gradient(135deg,var(--sa),#EDD5BE)}
.pc-body{padding:18px 20px 22px}
.pc-cat{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--r);margin-bottom:6px}
.pc-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--d)}
.pc:not(:first-child) .pc-name{font-size:16px}
.pc-price{font-size:13px;font-weight:700;color:var(--go);margin-top:4px}
.pc-cta{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--r);text-decoration:none;transition:gap .2s}
.pc-cta:hover{gap:12px}
.pc-badge{position:absolute;top:14px;left:14px;padding:5px 12px;border-radius:2px;font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}
.pc-badge.hot{background:var(--r);color:#fff}
.pc-badge.new{background:var(--go);color:#fff}
.prod-grid-2{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:16px}
.prod-grid-2 .pc-img,.prod-grid-2 .pc-emoji{height:160px}
.prod-grid-2 .pc-name{font-size:15px}

/* ABOUT */
.about{background:var(--d);display:grid;grid-template-columns:1fr 1fr;gap:0}
.about-visual{position:relative;overflow:hidden;min-height:560px}
.about-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.55) saturate(1.2)}
.about-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,transparent 60%,var(--d) 100%)}
.about-text{display:flex;flex-direction:column;justify-content:center;padding:80px 64px 80px 56px}
.about-tag{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--r2);margin-bottom:16px}
.about-h{font-family:'Playfair Display',serif;font-size:clamp(32px,3.5vw,48px);font-weight:300;color:#fff;line-height:1.15;margin-bottom:24px}
.about-h strong{font-weight:900;color:var(--r2);display:block}
.shaki-av{width:80px;height:80px;border-radius:50%;object-fit:cover;object-position:top;border:3px solid var(--r2);margin-bottom:20px}
.about-p{font-size:14px;color:rgba(255,255,255,.5);line-height:1.8;margin-bottom:32px;max-width:380px}
.about-list{list-style:none;display:flex;flex-direction:column;gap:12px}
.about-list li{display:flex;align-items:center;gap:12px;font-size:13px;color:rgba(255,255,255,.65)}
.about-list li::before{content:'✦';color:var(--r2);font-size:10px;flex-shrink:0}

/* CTA FINAL */
.cta-final{background:var(--r);padding:100px 64px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;position:relative;overflow:hidden}
.cta-final::before{content:'SHAKI';position:absolute;right:-60px;top:50%;transform:translateY(-50%) rotate(90deg);font-family:'Playfair Display',serif;font-size:200px;font-weight:900;color:rgba(255,255,255,.04);pointer-events:none;white-space:nowrap}
.cf-h{font-family:'Playfair Display',serif;font-size:clamp(36px,4.5vw,58px);font-weight:900;color:#fff;line-height:1.0}
.cf-h em{font-style:italic;font-weight:400;display:block;opacity:.8}
.cf-sub{font-size:15px;color:rgba(255,255,255,.65);line-height:1.7;margin-top:16px}
.cf-right{display:flex;flex-direction:column;gap:14px;align-items:flex-start}
.btn-wa{display:inline-flex;align-items:center;gap:12px;background:#fff;color:var(--r);padding:18px 40px;border-radius:3px;width:100%;justify-content:center;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;max-width:380px;box-shadow:0 12px 40px rgba(0,0,0,.2);transition:all .3s}
.btn-wa:hover{background:var(--cr);transform:translateY(-2px)}
.btn-wa2{display:inline-flex;align-items:center;gap:10px;border:1.5px solid rgba(255,255,255,.3);color:rgba(255,255,255,.8);padding:16px 40px;border-radius:3px;width:100%;justify-content:center;font-size:13px;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;max-width:380px;transition:all .3s}
.btn-wa2:hover{border-color:#fff;color:#fff}
.infos{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.info-line{display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,.6)}
.info-line strong{color:#fff}

/* FOOTER */
.foot{background:var(--d);padding:28px 64px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(200,24,74,.1)}
.foot-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--r2)}
.foot-logo em{font-style:italic}
.foot-txt{font-size:12px;color:#3D1A28}
.foot-credit{font-size:11px;color:#5A2A38}
.foot-credit strong{color:var(--r3)}

/* WA FLOAT */
.wa-float{position:fixed;bottom:28px;right:28px;z-index:800;width:56px;height:56px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;font-size:26px;text-decoration:none;box-shadow:0 6px 24px rgba(37,211,102,.45);animation:pulse 2.5s ease-in-out infinite}
.wa-float:hover{transform:scale(1.1)}

/* ANIMATIONS */
@keyframes up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pulse{0%,100%{box-shadow:0 6px 24px rgba(37,211,102,.4)}50%{box-shadow:0 6px 44px rgba(37,211,102,.7)}}
.r{opacity:0;transform:translateY(32px);transition:opacity .65s,transform .65s}
.r.v{opacity:1;transform:translateY(0)}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}.d4{transition-delay:.4s}

/* MOBILE */
@media(max-width:860px){
  .hero-model{display:none}
  .hero-content{padding:110px 24px 80px;max-width:100%}
  .float-badge{right:20px;bottom:32px}
  .sec{padding:70px 24px}
  .gars{padding:40px 24px}
  .gar-grid{grid-template-columns:1fr 1fr}
  .prod-head{flex-direction:column;align-items:flex-start;gap:16px}
  .prod-grid{grid-template-columns:1fr 1fr}
  .prod-grid .pc:first-child{grid-column:span 2;grid-row:auto}
  .prod-grid .pc:first-child .pc-img{height:260px}
  .prod-grid-2{grid-template-columns:1fr 1fr}
  .about{grid-template-columns:1fr}
  .about-visual{min-height:240px}
  .about-text{padding:48px 24px}
  
  .cta-final{grid-template-columns:1fr;padding:60px 24px}
  .foot{flex-direction:column;gap:10px;text-align:center;padding:24px}
  .hero-badges{gap:20px}
}
</style>
</head>
